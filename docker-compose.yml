services:
  mmo001:
    build: .
    image: mmo001:latest
    # Share the host network so the container can reach host Ollama at 127.0.0.1.
    # Bridge + host.docker.internal (172.17.0.1) is often EHOSTUNREACH on Linux VPSes.
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-3000}
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-}
      LEGACY_ACCOUNT_USERNAME: ${LEGACY_ACCOUNT_USERNAME:-legacy}
      LEGACY_ACCOUNT_PASSWORD: ${LEGACY_ACCOUNT_PASSWORD:-legacy}
      DEBUG_EVENTS: ${DEBUG_EVENTS:-1}
      DEBUG_LOG_FILE: ${DEBUG_LOG_FILE:-/app/data/debug-events.log}
      DEBUG_LOG_MAX_BYTES: ${DEBUG_LOG_MAX_BYTES:-5242880}
      DEBUG_LOG_MAX_FILES: ${DEBUG_LOG_MAX_FILES:-5}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-1}
      # Host network: loopback is the host. Do not interpolate ${OLLAMA_URL} from .env alone.
      OLLAMA_URL: ${DOCKER_OLLAMA_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mmo001-quests}
      QUEST_GEN_COOLDOWN_MS: ${QUEST_GEN_COOLDOWN_MS:-60000}
      QUEST_GEN_MAX_ACTIVE: ${QUEST_GEN_MAX_ACTIVE:-3}
      QUEST_GEN_LOG: ${QUEST_GEN_LOG:-1}
      QUEST_GEN_LOG_FILE: ${QUEST_GEN_LOG_FILE:-/app/data/quest-generation.log}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
